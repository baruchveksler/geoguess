<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>GeoGuess Final Fix</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://unpkg.com/mapillary-js@4.1.0/dist/mapillary.css" rel="stylesheet" />
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: #111; color: white; font-family: sans-serif; }
        #mly { flex: 2; background: #000; }
        #map { flex: 1; border-top: 3px solid #444; }
        .ui-box { position: absolute; top: 10px; left: 10px; z-index: 1000; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 1px solid #555; }
        button { background: #6366f1; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #333; }
    </style>
</head>
<body>

    <div class="ui-box">
        <div id="msg">Loading Street View...</div>
        <div id="score" style="margin: 10px 0; color: #fbbf24; font-weight: bold;">Score: 0</div>
        <button id="guess-btn" onclick="handleGuess()" disabled>Click Map to Guess</button>
    </div>

    <div id="mly"></div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/mapillary-js@4.1.0/dist/mapillary.js"></script>

    <script>
        // 1. PASTE YOUR TOKEN HERE
        const ACCESS_TOKEN = 'MLY|26161386426872305|aea2f8723b77c3ae6b17b7e5b04cba42'; 

        // Stable Coordinate List
        const PLACES = [
            { lat: 48.8584, lng: 2.2945 }, // Paris
            { lat: 40.7580, lng: -73.9855 }, // NYC
            { lat: 35.6895, lng: 139.6917 }  // Tokyo
        ];

        let mlyViewer;
        let leafletMap;
        let userMarker;
        let currentRound = 0;
        let totalScore = 0;

        function init() {
            // Setup Leaflet
            leafletMap = L.map('map').setView([20, 0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(leafletMap);

            leafletMap.on('click', (e) => {
                if (userMarker) leafletMap.removeLayer(userMarker);
                userMarker = L.marker(e.latlng).addTo(leafletMap);
                document.getElementById('guess-btn').disabled = false;
                document.getElementById('guess-btn').innerText = "Submit Guess";
            });

            // Setup Mapillary
            mlyViewer = new mapillary.Viewer({
                accessToken: ACCESS_TOKEN,
                container: 'mly',
                component: { cover: false }
            });

            loadNewLocation();
        }

        async function loadNewLocation() {
            const pos = PLACES[currentRound];
            // We use the Graph API to find the nearest Image ID
            const url = `https://graph.mapillary.com/images?access_token=${ACCESS_TOKEN}&fields=id&limit=1&closeto=${pos.lng},${pos.lat}`;

            try {
                const res = await fetch(url);
                const json = await res.json();
                if (json.data && json.data.length > 0) {
                    // THE FIX: Use .moveTo(), NOT .moveCloseTo()
                    mlyViewer.moveTo(json.data[0].id);
                    document.getElementById('msg').innerText = "Round " + (currentRound + 1) + ": Where are you?";
                }
            } catch (err) {
                document.getElementById('msg').innerText = "Error loading imagery.";
            }
        }

        function handleGuess() {
            alert("Great guess! Moving to next round.");
            currentRound++;
            if (currentRound >= PLACES.length) {
                alert("Game Over! Final Score: " + totalScore);
                location.reload();
            } else {
                if (userMarker) leafletMap.removeLayer(userMarker);
                document.getElementById('guess-btn').disabled = true;
                loadNewLocation();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
