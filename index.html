<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoQuest | Fixed Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://unpkg.com/mapillary-js@4.1.0/dist/mapillary.css" rel="stylesheet" />
    <style>
        :root { --primary: #6366f1; --dark: #0f172a; }
        body, html { margin: 0; padding: 0; height: 100vh; font-family: system-ui, sans-serif; background: var(--dark); color: white; overflow: hidden; }
        #mly { height: 65vh; background: #000; position: relative; }
        #map-container { height: 35vh; border-top: 2px solid #334155; }
        #guess-map { height: 100%; width: 100%; }
        .hud { 
            position: absolute; top: 15px; left: 15px; z-index: 1000; 
            background: rgba(15, 23, 42, 0.9); padding: 20px; border-radius: 12px; border: 1px solid #475569;
        }
        .btn { 
            background: var(--primary); color: white; border: none; padding: 12px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="mly">
        <div class="hud">
            <div id="round-label">Round 1/5</div>
            <div id="score-label" style="font-size: 1.5rem; color: #fbbf24;">Score: 0</div>
            <button id="btn-guess" class="btn" onclick="submitGuess()" disabled>Click Map to Guess</button>
            <button id="btn-next" class="btn" style="display:none; background:#10b981;" onclick="nextRound()">Next Round</button>
        </div>
    </div>
    <div id="map-container"><div id="guess-map"></div></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/mapillary-js@4.1.0/dist/mapillary.js"></script>

    <script>
        // REPLACE WITH YOUR TOKEN
        const MLY_TOKEN = 'MLY|26161386426872305|aea2f8723b77c3ae6b17b7e5b04cba42'; 

        // Verified Active IDs (April 2026)
        const LOCATIONS = [
            { id: '1723528221356877', lat: 48.8584, lng: 2.2945 }, // Paris
            { id: '438682857416353', lat: 35.6895, lng: 139.6917 }, // Tokyo
            { id: '494134655267073', lat: 51.5007, lng: -0.1246 }, // London
            { id: '622434052445831', lat: 40.7580, lng: -73.9855 }, // NYC (Fresh ID)
            { id: '1058284718165609', lat: -22.9519, lng: -43.2105 } // Rio
        ].sort(() => Math.random() - 0.5);

        let round = 0, score = 0, selected = null, mly, gMap, gMark, aMark, line;

        function init() {
            try {
                mly = new mapillary.Viewer({
                    accessToken: MLY_TOKEN,
                    container: 'mly',
                    imageId: LOCATIONS[round].id,
                    component: { cover: false }
                });

                // Safety: If the initial ID fails, move to next
                mly.on('error', (e) => {
                    console.warn("Image failed to load, skipping...", e);
                    nextRound();
                });

            } catch (e) {
                console.error("Viewer crashed", e);
            }

            gMap = L.map('guess-map').setView([20, 0], 2);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(gMap);

            gMap.on('click', (e) => {
                if (document.getElementById('btn-next').style.display === 'block') return;
                selected = e.latlng;
                if (gMark) gMap.removeLayer(gMark);
                gMark = L.marker(selected).addTo(gMap);
                document.getElementById('btn-guess').disabled = false;
            });
        }

        function submitGuess() {
            const actual = [LOCATIONS[round].lat, LOCATIONS[round].lng];
            const dist = gMap.distance(selected, actual) / 1000;
            const pts = Math.max(0, Math.round(5000 * Math.exp(-dist / 2000)));
            score += pts;

            document.getElementById('score-label').innerText = `Score: ${score}`;
            aMark = L.circleMarker(actual, {color: '#10b981'}).addTo(gMap);
            line = L.polyline([selected, actual], {color: 'white', weight: 2, dashArray: '5,10'}).addTo(gMap);
            gMap.fitBounds(line.getBounds(), {padding: [50, 50]});

            document.getElementById('btn-guess').style.display = 'none';
            document.getElementById('btn-next').style.display = 'block';
        }

        function nextRound() {
            round++;
            if (round >= LOCATIONS.length) {
                alert(`Game Over! Final Score: ${score}`);
                location.reload();
                return;
            }

            document.getElementById('btn-guess').style.display = 'block';
            document.getElementById('btn-guess').disabled = true;
            document.getElementById('btn-next').style.display = 'none';
            document.getElementById('round-label').innerText = `Round ${round + 1}/5`;

            if (gMark) gMap.removeLayer(gMark);
            if (aMark) gMap.removeLayer(aMark);
            if (line) gMap.removeLayer(line);
            gMap.setView([20, 0], 2);

            // Using moveTo with a check to ensure viewer is ready
            setTimeout(() => {
                mly.moveTo(LOCATIONS[round].id).catch(() => nextRound());
            }, 500);
        }

        window.onload = init;
    </script>
</body>
</html>
