<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoQuest | Street View Explorer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://unpkg.com/mapillary-js@4.1.0/dist/mapillary.css" rel="stylesheet" />
    <style>
        :root { --primary: #6366f1; --success: #10b981; --dark: #0f172a; }
        body, html { margin: 0; padding: 0; height: 100vh; font-family: system-ui, sans-serif; background: var(--dark); color: white; overflow: hidden; }
        
        #game-layout { display: flex; flex-direction: column; height: 100%; }
        
        /* Viewer takes top 65% */
        #mly { flex: 6.5; background: #000; position: relative; }
        
        /* Map takes bottom 35% */
        #map-container { flex: 3.5; border-top: 2px solid #334155; position: relative; }
        #guess-map { height: 100%; width: 100%; }

        /* UI HUD */
        .hud { 
            position: absolute; top: 15px; left: 15px; z-index: 1000; 
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px);
            padding: 20px; border-radius: 12px; border: 1px solid #475569;
            min-width: 180px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        .score-display { font-size: 1.5rem; font-weight: 800; color: #fbbf24; margin-bottom: 5px; }
        .round-display { font-size: 0.9rem; text-transform: uppercase; color: #94a3b8; letter-spacing: 1px; }

        .btn { 
            background: var(--primary); color: white; border: none; padding: 12px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; 
            margin-top: 15px; transition: all 0.2s ease;
        }
        .btn:disabled { background: #334155; opacity: 0.5; cursor: not-allowed; }
        .btn-next { background: var(--success); display: none; }
        
        /* Responsive tweaks */
        @media (max-width: 768px) {
            #mly { flex: 5; }
            #map-container { flex: 5; }
        }
    </style>
</head>
<body>

<div id="game-layout">
    <div id="mly">
        <div class="hud">
            <div class="round-display">Round <span id="r-val">1</span> of 5</div>
            <div class="score-display">Score: <span id="s-val">0</span></div>
            <button id="btn-guess" class="btn" onclick="submitGuess()" disabled>Click Map to Guess</button>
            <button id="btn-next" class="btn btn-next" onclick="nextRound()">Next Round</button>
        </div>
    </div>
    <div id="map-container">
        <div id="guess-map"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/mapillary-js@4.1.0/dist/mapillary.js"></script>

<script>
    // --- CONFIGURATION ---
    // PASTE YOUR TOKEN HERE
    const MLY_TOKEN = 'MLY|26161386426872305|aea2f8723b77c3ae6b17b7e5b04cba42'; 

    // Stable Mapillary Image IDs
    const LOCATIONS = [
        { id: '1723528221356877', lat: 48.8584, lng: 2.2945 }, // Paris
        { id: '344843911043329', lat: 40.7580, lng: -73.9855 }, // NYC
        { id: '438682857416353', lat: 35.6895, lng: 139.6917 }, // Tokyo
        { id: '1431604510645607', lat: 51.5007, lng: -0.1246 }, // London
        { id: '1058284718165609', lat: -22.9519, lng: -43.2105 } // Rio
    ].sort(() => Math.random() - 0.5);

    let round = 0, totalScore = 0, selectedPos = null;
    let mly, gMap, gMarker, aMarker, line;

    function init() {
        // Initialize Mapillary Viewer
        mly = new mapillary.Viewer({
            accessToken: MLY_TOKEN,
            container: 'mly',
            imageId: LOCATIONS[round].id,
            component: { cover: false }
        });

        // Initialize Guess Map
        gMap = L.map('guess-map', { worldCopyJump: true }).setView([20, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(gMap);

        // Map Click Interaction
        gMap.on('click', (e) => {
            if (document.getElementById('btn-next').style.display === 'block') return;
            
            selectedPos = e.latlng;
            if (gMarker) gMap.removeLayer(gMarker);
            gMarker = L.marker(selectedPos).addTo(gMap);
            
            const btn = document.getElementById('btn-guess');
            btn.disabled = false;
            btn.innerText = "Submit Guess";
        });
    }

    function submitGuess() {
        const actual = [LOCATIONS[round].lat, LOCATIONS[round].lng];
        
        // Calculate Distance using Leaflet built-in (m -> km)
        const distance = gMap.distance(selectedPos, actual) / 1000;
        
        // Scoring Formula (5000 max)
        const points = Math.max(0, Math.round(5000 * Math.exp(-distance / 2000)));
        totalScore += points;

        // Visual Feedback on Map
        aMarker = L.circleMarker(actual, { color: '#10b981', radius: 10, weight: 3 }).addTo(gMap);
        line = L.polyline([selectedPos, actual], { color: 'white', weight: 2, dashArray: '8, 8' }).addTo(gMap);
        gMap.fitBounds(line.getBounds(), { padding: [50, 50] });

        // Update UI
        document.getElementById('s-val').innerText = totalScore;
        document.getElementById('btn-guess').style.display = 'none';
        document.getElementById('btn-next').style.display = 'block';
        
        alert(`Distance: ${distance.toFixed(1)} km\nScore: +${points} pts`);
    }

    function nextRound() {
        round++;
        if (round >= 5) {
            alert(`Game Over! Final Score: ${totalScore}`);
            location.reload();
            return;
        }

        // Reset UI Elements
        document.getElementById('btn-guess').style.display = 'block';
        document.getElementById('btn-guess').disabled = true;
        document.getElementById('btn-guess').innerText = "Click Map to Guess";
        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('r-val').innerText = round + 1;

        // Clear Map Layers
        if (gMarker) gMap.removeLayer(gMarker);
        if (aMarker) gMap.removeLayer(aMarker);
        if (line) gMap.removeLayer(line);
        gMap.setView([20, 0], 2);

        // Move Viewer with Error Handling
        if (mly.isNavigable) {
            mly.moveTo(LOCATIONS[round].id).catch(err => {
                console.error("View failed to load", err);
                alert("Location load error. Skipping...");
                nextRound();
            });
        } else {
            // Wait for viewer to be navigable if it's lagging
            setTimeout(() => mly.moveTo(LOCATIONS[round].id), 800);
        }
    }

    window.onload = init;
</script>

</body>
</html>
